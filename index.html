<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OCTOPUS · Assistant IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04080F;color:#F8FAFC;font-family:sans-serif;height:100vh;display:flex;flex-direction:column}
header{padding:1rem;text-align:center;border-bottom:1px solid #0066CC}
h1{font-size:1.4rem;font-weight:900;background:linear-gradient(90deg,#00A651,#0066CC,#E53935);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p.sub{font-size:.65rem;color:#94A3B8;margin-top:.3rem}
#chat{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.8rem}
.msg{max-width:85%;padding:.8rem 1rem;border-radius:12px;font-size:.85rem;line-height:1.5}
.user{background:#0066CC;color:#fff;align-self:flex-end;border-radius:12px 12px 2px 12px}
.bot{background:#0A1224;border:1px solid #0066CC;color:#F8FAFC;align-self:flex-start;border-radius:12px 12px 12px 2px}
.bot.loading{color:#94A3B8;font-style:italic}
footer{padding:.8rem;border-top:1px solid #0066CC;display:flex;gap:.5rem}
textarea{flex:1;background:#111827;border:1px solid #0066CC;border-radius:8px;padding:.6rem;color:#F8FAFC;font-size:.85rem;resize:none;height:44px;outline:none}
button{padding:.6rem 1rem;background:#0066CC;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.85rem}
.octopus{font-size:2rem}
.status{font-size:.6rem;margin-top:.2rem}
.status.ok{color:#00A651}
.status.warn{color:#F59E0B}
</style>
</head>
<body>
<header>
<div class="octopus">🐙</div>
<h1>MUJOS OCTOPUS</h1>
<p class="sub">Assistant IA Personnel · Powered by Groq</p>
<p class="status" id="status">⏳ Chargement mémoire...</p>
</header>
<div id="chat">
<div class="msg bot">Salut ! Je suis Octopus, ton assistant IA personnel. Comment puis-je t'aider aujourd'hui ? 🐙</div>
</div>
<footer>
<textarea id="inp" placeholder="Pose ta question..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyer()}"></textarea>
<button onclick="envoyer()">➤</button>
</footer>
<script>
const history = [];
let memoire = null;

async function chargerMemoire(){
  try{
    const r = await fetch("/api/memory");
    const d = await r.json();
    memoire = {
      nom: d.utilisateur?.nom || 'Mujos',
      ville: d.utilisateur?.ville || 'Maputo',
      pays: d.utilisateur?.pays || 'Mozambique',
      projets: (d.utilisateur?.projets || []).join(', '),
      competences: (d.utilisateur?.competences || []).join(', '),
      sujets: (d.conversations?.sujets_recents || []).join(', ') || 'aucun'
    };
    const st = document.getElementById('status');
    st.className = 'status ok';
    st.innerText = '🟢 Mémoire active · Web search activé';
  }catch(e){
    memoire = {nom:'Mujos',ville:'Maputo',pays:'Mozambique',projets:'WorldCup2026, Octopus',competences:'JavaScript, Python',sujets:'aucun'};
    const st = document.getElementById('status');
    st.className = 'status warn';
    st.innerText = '🟡 Mode basique actif';
  }
}

async function envoyer(){
  const inp = document.getElementById('inp');
  const msg = inp.value.trim();
  if(!msg || !memoire) return;
  inp.value = '';
  ajouterMsg(msg, 'user');
  history.push({role:"user", content:msg});
  const loading = ajouterMsg("⏳ Réflexion...", 'bot loading');
  try{
    const r = await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:history, memoire:memoire})
    });
    const d = await r.json();
    const rep = d.choices[0].message.content;
    history.push({role:"assistant", content:rep});
    if(history.length > 10) history.splice(0, 2);
    loading.className = 'msg bot';
    loading.innerText = rep;
  }catch(e){
    loading.className = 'msg bot';
    loading.innerText = "⚠️ Erreur de connexion. Réessaie.";
  }
  document.getElementById('chat').scrollTop = 99999;
}

function ajouterMsg(texte, classe){
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg '+classe;
  d.innerText = texte;
  c.appendChild(d);
  c.scrollTop = 99999;
  return d;
}

chargerMemoire();
</script>
</body>
</html>
